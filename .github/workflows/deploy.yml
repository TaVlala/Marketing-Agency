# =============================================================================
# deploy.yml — CI/CD workflow for IPA Marketing Agency static site
#
# Vercel handles all GitHub-triggered deploys automatically via its
# GitHub integration (no workflow needed for push-to-master).
#
# This workflow only handles two cases:
#   1. workflow_dispatch  — manual rebuild from GitHub Actions UI
#   2. repository_dispatch (cms-update) — Payload CMS calls this webhook
#      when content is published, triggering a fresh Vercel rebuild
#
# Required GitHub Secret:
#   VERCEL_DEPLOY_HOOK — get from Vercel: Project → Settings → Git → Deploy Hooks
# =============================================================================

name: Trigger Vercel Rebuild

on:
  # Manual trigger from GitHub Actions UI
  workflow_dispatch:

  # Payload CMS webhook — fires when content is published/updated
  repository_dispatch:
    types:
      - cms-update

jobs:
  trigger-deploy:
    name: Trigger Vercel Deploy
    runs-on: ubuntu-latest

    steps:
      - name: Trigger Vercel Deploy Hook
        run: curl -X POST "${{ secrets.VERCEL_DEPLOY_HOOK }}"
